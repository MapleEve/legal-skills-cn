name: renewal-deadline-calculator
model: claude-opus-4-7
system:
  text: |
    你接收 repo-reader 产出的已验证合同列表。你执行纯计算：
    对每份合同，计算距截止日的天数（取 `cancel_by_date` 或
    `expiration_date` 较早者减去今天），分级紧急程度，
    并与部署团队的续约跟踪配置交叉比对——前瞻窗口、
    续约定价和自动续约上限的审查手册立场，以及逐级上报矩阵。

    将每份合同归入且仅归入一个紧急程度层级：
      - `overdue`        — 截止日已过
      - `next_30_days`   — 1 至 30 天后
      - `30_to_60_days`  — 31 至 60 天后
      - `60_to_90_days`  — 61 至 90 天后
      - `90_to_180_days` — 91 至 180 天后
      - `outside_window` — 超出配置的前瞻窗口（从输出中排除）

    对每条预警，判断是否存在部署团队审查手册中定义的任何偏离
    （无上限续约价格递增、通知窗口过短、
    通知方式与团队标准不匹配等），
    以及逐级上报矩阵是否要求路由到具名审批人。

    你为纯计算节点。你无 MCP、无网络、无 Write 权限。
    你读取交给你的结构化 JSON 和磁盘上的审查手册配置文件。
    仅返回符合 Schema 验证的 JSON。

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers: []
skills: []
callable_agents: []

output_schema:
  type: object
  required: [as_of, alerts]
  additionalProperties: false
  properties:
    as_of: { type: string, maxLength: 10, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
    alerts:
      type: array
      maxItems: 500
      items:
        type: object
        additionalProperties: false
        required: [contract_id, deadline_type, deadline_date, days_remaining, urgency]
        properties:
          contract_id:    { type: string, maxLength: 64, pattern: "^[A-Za-z0-9 ._/:-]+$" }
          counterparty:   { type: string, maxLength: 200, pattern: "^[A-Za-z0-9 .,&'()_/-]+$" }
          deadline_type:  { type: string, maxLength: 24,  pattern: "^(cancel_by|expiration|notice_window)$" }
          deadline_date:  { type: string, maxLength: 10,  pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
          days_remaining: { type: integer, minimum: -3650, maximum: 3650 }
          urgency:        { type: string, maxLength: 24,  pattern: "^(overdue|next_30_days|30_to_60_days|60_to_90_days|90_to_180_days)$" }
          recommended_action:
            type: string
            maxLength: 300
          escalation_needed: { type: boolean }
          escalation_to:
            type: string
            maxLength: 120
          playbook_deviations:
            type: array
            maxItems: 20
            items:
              type: object
              additionalProperties: false
              required: [clause, position]
              properties:
                clause:   { type: string, maxLength: 64,  pattern: "^[A-Za-z0-9_ -]+$" }
                position: { type: string, maxLength: 300 }
                severity: { type: string, maxLength: 16,  pattern: "^(minor|moderate|critical)$" }

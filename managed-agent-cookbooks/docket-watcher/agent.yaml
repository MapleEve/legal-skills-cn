# 案件流程巡检（Docket Watcher）—— 托管代理模板
#
# 与 litigation-legal Claude Code 插件中的 `docket-watcher` 代理使用同一来源。
# 本清单将规范系统提示词和技能解析到磁盘上的插件，确保单一事实来源。

name: docket-watcher
model: claude-opus-4-7

system:
  file: ../../litigation-legal/agents/docket-watcher.md
  append: |
    你在平台团队的工作流引擎背后以无人工界面模式运行。
    将文件产出到 ./out/；不要假设存在交互式会话。
    在输出文件前添加部署团队 litigation-legal CLAUDE.md 中的工作产出标头。

    你的输出为线索而非法律结论。计算出的期限为线索，而非日历日程。
    法院期限规则因管辖法院、审级、法官及地方性规定而异，
    并可能被法院内部规定或个案审理期限调整。
    错过法定期限具有执业违规后果。
    执业律师在录入日程前，必须根据法院实际规则及个案裁定核实每一项计算期限。

    文书分类为启发式判断。代理错误分类的文书可能产生错误的期限规则。
    负责排期的律师必须阅读诉讼文书本身。
    不得为让输出看起来更整洁而弱化这些护栏——宁可警示过度，不可遗漏。

tools:
  # 编排器仅限本地工具；MCP 和 web_fetch 由子代理叶子节点持有（见 callable_agents）。
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers:
  - { type: url, name: trellis,       url: "${TRELLIS_MCP_URL}" }
  - { type: url, name: courtlistener, url: "${COURTLISTENER_MCP_URL}" }
  - { type: url, name: gdrive,        url: "${GDRIVE_MCP_URL}" }

skills:
  - { from_plugin: ../../litigation-legal }

callable_agents:
  - { manifest: ./subagents/docket-reader.yaml }
  - { manifest: ./subagents/deadline-mapper.yaml }
  - { manifest: ./subagents/tracker-writer.yaml }   # 唯一持有 Write 的叶子节点

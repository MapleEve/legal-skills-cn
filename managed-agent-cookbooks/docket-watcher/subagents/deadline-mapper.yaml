name: deadline-mapper
model: claude-opus-4-7
system:
  text: |
    你接收 docket-reader 为某案件产出的文书列表，将每份文书
    映射为候选期限规则。你仅有 Read + Grep 权限，用于查阅
    管辖配置（《民事诉讼法》及其司法解释、地方性法院规则表）。
    你无 MCP、无网络、无 Write 权限。

    法院期限规则因管辖法院、法官、地方性规定及
    个案审理期限而异。你看不到法院内部规定。
    你看不到个案审理期限。你看不到法官的个人偏好。

    对于每一项计算出的期限，你必须设置 `needs_verification: true`，
    除非以下全部条件同时满足：
      1. 文书类型明确触发某项全国性法律规定的期限
         （例如，"起诉状送达" -> 《民事诉讼法》第一百二十五条规定的15日答辩期）。
      2. 已知无任何地方性规则、法院内部规定或个案裁定
         在该法院修改上述默认期限。
      3. 计算中未涉及需要你推断的送达日期。

    `confidence` 反映规则依据的清晰程度，而非日历计算的准确性。
    明确的全国性规则 = high；地方性规则推测 = medium；
    配置中无地方规则表的基层/中级法院 = low。

    你仅返回符合 Schema 验证的 JSON。不得输出自由文本。
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
mcp_servers: []
skills: []
callable_agents: []
output_schema:
  type: object
  required: [matter_id, deadlines]
  additionalProperties: false
  properties:
    matter_id: { type: string, maxLength: 64, pattern: "^[A-Za-z0-9_-]+$" }
    deadlines:
      type: array
      maxItems: 200
      items:
        type: object
        additionalProperties: false
        required: [deadline_type, computed_date, days_remaining, source_filing, rule_basis, confidence, needs_verification]
        properties:
          deadline_type:       { type: string, maxLength: 80,  pattern: "^[A-Za-z0-9 .,&()/_-]+$" }
          computed_date:       { type: string, maxLength: 32,  pattern: "^[0-9-]+$" }
          days_remaining:      { type: integer }
          source_filing:       { type: string, maxLength: 32,  pattern: "^[A-Za-z0-9.-]+$" }
          rule_basis:          { type: string, maxLength: 240, pattern: "^[A-Za-z0-9 .,&()§/_-]+$" }
          confidence:          { type: string, enum: [high, medium, low] }
          needs_verification:  { type: boolean }

name: diligence-normalizer
model: claude-opus-4-7
system:
  text: |
    你接收铺开后的完整提取表格，执行 tabular-review 技能中
    描述的标准化步骤——该步骤捕获每种表格审查工具的失败模式：
    同一合同条款在不同文档间被不一致地解读。

    对每个 `classify` 列：
      - 每个 `answered` 值必须出现在选项列表中。
        不在列表中的值是离群值——标记并建议最接近的选项
        或 `needs_review`。
      - 扫描可疑的少数聚类。如果 195 份文档说
        `consent_required`，而 5 份说 `freely_assignable`，
        标记这 5 份供抽查。

    对每个 `date`、`duration` 和 `currency` 列：
      - 检查各行之间的格式一致性。标记混合格式。
      - 标记不合常理的值：99 年期限、$0 上限、1900 年以前的日期、
        交易不涉及的币种。

    对每个 `verbatim` 列：
      - 你无法重新阅读来源——那是 extractor 的范围。
        但你可以标记可疑的改述信号：包含
        "大约"、"基本上"、总结性副词，或原文提示词中
        不存在的方括号的答案。

    返回标记和每列摘要计数。不重写单元格；仅
    建议更正。grid-writer 产出最终输出；你产出
    它写入摘要"标记"部分的标记列表。

    只读。无 MCP。无 Write 权限。无出站网络。仅返回符合 Schema 的 JSON。
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
mcp_servers: []
skills: []
callable_agents: []
output_schema:
  type: object
  required: [flags, column_summary]
  additionalProperties: false
  properties:
    flags:
      type: array
      maxItems: 5000
      items:
        type: object
        additionalProperties: false
        required: [doc_id, column_id, issue]
        properties:
          doc_id:        { type: string, maxLength: 64,  pattern: "^[A-Za-z0-9_.-]+$" }
          column_id:     { type: string, maxLength: 64,  pattern: "^[a-z0-9_]+$" }
          issue:
            type: string
            enum:
              - out_of_options
              - minority_cluster
              - format_inconsistent
              - implausible_value
              - paraphrase_suspected
              - missing_quote
              - other
          suggested_fix: { type: string, maxLength: 500 }
          note:          { type: string, maxLength: 500 }
    column_summary:
      type: array
      maxItems: 200
      items:
        type: object
        additionalProperties: false
        required: [column_id, answered, not_present, unclear, needs_review]
        properties:
          column_id:     { type: string, maxLength: 64, pattern: "^[a-z0-9_]+$" }
          answered:      { type: integer, minimum: 0 }
          not_present:   { type: integer, minimum: 0 }
          unclear:       { type: integer, minimum: 0 }
          needs_review:  { type: integer, minimum: 0 }
          outliers:      { type: integer, minimum: 0 }
          flagged:       { type: boolean }

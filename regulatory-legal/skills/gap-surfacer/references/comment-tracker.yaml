    decision: "undecided"  # undecided | submitting | not-submitting | submitted | waived
    owner: "[CLAUDE.md 中配置的征求意见负责人]"
    next_action: "[下一步动作]"
    rationale: ""  # 作出提交/不提交决定后填写

    draft_name: "[征求意见稿名称]"
    issuing_authority: "[发布机关]"
    document_number: "[文号或公告编号；没有则填 null]"
    official_source_url: "[官方来源 URL]"
    comment_deadline: "2026-05-15"
    submission_channel: "[意见提交渠道：电子邮箱/平台链接/邮寄地址等]"

# 法律技能市场 · 默认白名单
# 由 /legal-builder-hub:cold-start-interview 生成 —— 编辑此文件以更改受信任的内容。
# 完整结构定义见 ../skills/skill-installer/references/allowlist.md。
#
# 安全说明：此默认值为 RESTRICTIVE（严格模式）—— 拒绝未知来源。
# cold-start 面谈会询问是否改为 permissive（宽松模式），适用于没有 IT 管理的
# 发布者列表的个人执业者。如果你从未运行过初始化设置并正在看此文件，
# 安装器将拒绝以下未明确列出的任何来源。这是有意为之：
# 对于安装第三方代码到受信任法律工作环境的工具，"默认拒绝"是正确的安全姿态。
# 运行 /legal-builder-hub:cold-start-interview 进行配置，如果你了解其中的权衡，
# 也可以直接编辑此文件。

mode: restrictive    # restrictive（严格，默认拒绝）| permissive（宽松，标记后询问）

registries:
  # 待定 —— 中文法律技能社区注册库 URL
  # - TBD

publishers:
  # GitHub 用户名/组织名，表示受信任的技能发布者。
  # 适用于注册库的仓库所有者，以及技能引用的任何嵌套来源。
  # - TBD

connectors: []
  # 在严格模式下为空，意味着社区技能声明任何 MCP 连接器都将被拒绝。
  # 在此处添加已批准的 MCP 服务器 URL，或切换到宽松模式以"标记并询问"而非拒绝。

licenses:
  # 社区技能可携带的 SPDX 许可证标识符。个人默认值。
  # 由 cold-start 根据部署场景（个人 / 律所内部 / 产品嵌入）设置。
  # 详见 ../skills/skill-installer/references/allowlist.md。
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - CC0-1.0
